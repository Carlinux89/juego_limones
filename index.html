<!DOCTYPE html>
<html lang="es">

<head>
  <title>Jugo de Limón</title>
  <link rel="stylesheet" href="limones.css">
  <script src="util.js"></script>
</head>

<body onload="iniciar()">

  <div class="contenedor">

    <header class="header">
        <img src="logoKrakeDev.jpg" alt="KrakeDev - Escuela de Programación" class="logo">
      <h1>🍋 Atrapar Limones</h1>
      <p class="subtitulo">Si del cielo te caen limones...</p>
      <span class="autor">Por Carlos Chavez</span>
    </header>

    <section class="juego">
      <canvas id="areaJuego" width="600" height="400"></canvas>
    </section>

    <section class="panel">
      <div class="card">
        <span>🏆 Puntaje</span>
        <strong id="txtPuntaje">0</strong>
      </div>

      <div class="card">
        <span>❤️ Vidas</span>
        <strong id="txtVidas">3</strong>
      </div>
    </section>

    <section class="botones">
      <button onclick="moverIzquierda()">⬅</button>
      <button onclick="moverDerecha()">➡</button>
      <button class="reiniciar" onclick="reiniciar()">🔄</button>
    </section>

  </div>

  <script src="limones.js"></script>
</body>

</html>
